apiVersion: v1
kind: Template
metadata:
  name: default-reservation

objects:
- apiVersion: cloud.redhat.com/v1alpha1
  kind: NamespaceReservation
  metadata:
    name: ${NAME}
    labels:
      requester: ${REQUESTER}
  spec:
    duration: ${DURATION}
    requester: ${REQUESTER}
    team: ${TEAM}
    pool: ${POOL}
    secretSourceNamespace: ${SECRETS_SRC_NAMESPACE}

parameters:
- name: DURATION
  required: true
- name: REQUESTER
  required: true
- name: TEAM
  required: false
- name: NAME
  required: true
- name: POOL
  required: true
- name: SECRETS_SRC_NAMESPACE
  required: false
