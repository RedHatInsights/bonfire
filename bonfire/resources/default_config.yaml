# Bonfire deployment configuration

# If using '--source=file', defines where to fetch the file that defines application configs
#appsFile:
#  host: github
#  repo: myorg/myrepo
#  path: configs/apps.yaml

# (optional) define any apps locally. An app defined here with <name> will take precedence
# over config loaded via --source=file or --source=appsre. See README for more info:
# https://github.com/RedHatInsights/bonfire/blob/master/README.md#using-a-local-config
apps:
- name: my_custom_app
  components:
    - name: my_app_component
      host: github
      repo: some-org/some-repo
      path: deploy/template.yaml

# (optional) CLI aliases allow shorthand commands that expand to full commands with arguments.
# e.g. 'bonfire process rosa' expands to 'bonfire process ephemeral --target-env rosa-ephemeral ...'
# Use parameter names as they appear in the CLI (underscores), e.g. target_env, component_filter.
# Set an alias to null to disable a built-in default.
#aliases:
#  rosa:
#    app_names:
#      - ephemeral
#    args:
#      target_env: rosa-ephemeral
#      component_filter:
#        - rosa-cluster
